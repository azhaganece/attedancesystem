{% extends "base.html" %}

{% block title %}Create Admin - SINCET{% endblock %}

{% block content %}
<div class="admin-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>SINCET</h2>
            <span class="department">Principal Panel</span>
        </div>
        <nav>
            <a href="{{ url_for('principal_dashboard') }}" class="nav-item">
                <span>Dashboard</span>
            </a>
            <a href="{{ url_for('principal_all_students') }}" class="nav-item">
                <span>All Students</span>
            </a>
            <a href="{{ url_for('principal_all_leaves') }}" class="nav-item">
                <span>All Leaves</span>
            </a>
            <a href="{{ url_for('create_admin') }}" class="nav-item active">
                <span>Create Admin</span>
            </a>
            <a href="{{ url_for('logout') }}" class="nav-item logout-btn">
                <span>Logout</span>
            </a>
        </nav>
    </aside>
    <main class="main-content">
        <div class="content-header">
            <div class="header-actions">
                <a href="{{ url_for('principal_dashboard') }}" class="btn-back">Back to Dashboard</a>
                <h1>Create Admin Account</h1>
            </div>
            <p style="color: var(--text-secondary); margin-top: 8px;">Create a new department admin account</p>
        </div>

        <div class="form-container">
            <form method="POST">
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Admin Name</label>
                        <input type="text" id="name" name="name" placeholder="e.g., Dr. John Smith" required>
                    </div>
                    <div class="form-group">
                        <label for="department">Department</label>
                        <select id="department" name="department" required>
                            <option value="">-- Select Department --</option>
                            <option value="CSE">CSE - Computer Science</option>
                            <option value="ECE">ECE - Electronics</option>
                            <option value="IT">IT - Information Technology</option>
                            <option value="AIDS">AIDS - AI & Data Science</option>
                            <option value="MECH">MECH - Mechanical</option>
                            <option value="CIVIL">CIVIL - Civil Engineering</option>
                            <option value="EEE">EEE - Electrical</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="e.g., admin_mech" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter secure password" required>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Create Admin Account</button>
                    <a href="{{ url_for('principal_dashboard') }}" class="btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </main>
</div>
{% endblock %}
